<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>chapter-adult</title>
</head>
<body>
<div class="chapter cf">
  <div id="checkAdult" style="cursor:pointer;padding:20px;border:1px solid red;">请点击此处继续阅读</div>
  <img id="mangaFile" src="https://eu.manhuagui.com/img/test/adult-001.webp" alt="page 1" style="display:none" />
  <a id="next" href="javascript:;">下一页</a>
  <div class="page-count"><span id="page">1</span>/5</div>
</div>
<script>
(function() {
  var BASE = 'https://eu.manhuagui.com/img/test/';
  var IMAGES = [
    BASE + 'adult-001.webp',
    BASE + 'adult-002.webp',
    BASE + 'adult-003.webp',
    BASE + 'adult-004.webp',
    BASE + 'adult-005.webp'
  ];
  var idx = 0;
  var total = IMAGES.length;
  function updatePage() {
    var s = document.getElementById('page');
    if (s) s.textContent = (idx + 1) + '';
  }
  document.getElementById('checkAdult').addEventListener('click', function() {
    document.getElementById('checkAdult').style.display = 'none';
    document.getElementById('mangaFile').style.display = 'block';
  });
  document.getElementById('next').addEventListener('click', function() {
    idx++;
    if (idx < total) {
      document.getElementById('mangaFile').src = IMAGES[idx];
      updatePage();
    }
  });
})();
</script>
</body>
</html>
