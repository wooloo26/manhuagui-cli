<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>chapter-single</title>
</head>
<body>
<div class="chapter cf">
  <img id="mangaFile" src="https://eu.manhuagui.com/img/test/001.webp" alt="page 1" />
  <a id="next" href="javascript:;">下一页</a>
  <div class="page-count"><span id="page">1</span>/10</div>
</div>
<script>
(function() {
  var BASE = 'https://eu.manhuagui.com/img/test/';
  var IMAGES = [
    BASE + '001.webp',
    BASE + '002.webp',
    BASE + '003.webp',
    BASE + '004.webp',
    BASE + '005.webp',
    BASE + '006.webp',
    BASE + '007.webp',
    BASE + '008.webp',
    BASE + '009.webp',
    BASE + '010.webp'
  ];
  var idx = 0;
  var total = IMAGES.length;
  function updatePage() {
    var s = document.getElementById('page');
    if (s) s.textContent = (idx + 1) + '';
  }
  document.getElementById('next').addEventListener('click', function() {
    idx++;
    if (idx < total) {
      document.getElementById('mangaFile').src = IMAGES[idx];
      updatePage();
    }
  });
})();
</script>
</body>
</html>
